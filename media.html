<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Green Yard @ LUH – AI-based Rainwater Harvesting</title>

<style>

:root{
    --primary:#7dd3fc;
    --secondary:#38bdf8;
    --accent:#10b981;
    --glass:rgba(255,255,255,0.10);
    --glass-strong:rgba(255,255,255,0.18);
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(
        135deg,
        #0a2540 0%,
        #0e7490 45%,
        #10b981 100%
    );
    color:var(--text);
    line-height:1.7;
    min-height:100vh;
}

/* ---------- HEADER ---------- */

header{
    text-align:center;
    padding:80px 20px 50px;
    position:relative;
}

header h1{
    font-size:3rem;
    margin-bottom:15px;
    font-weight:700;
}

header p{
    max-width:900px;
    margin:auto;
    font-size:1.2rem;
    opacity:0.95;
}

/* ---------- NAVIGATION ---------- */

nav{
    margin-top:35px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:600;
    padding:10px 18px;
    border-radius:12px;
    transition:all 0.3s ease;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.15);
}

nav a:hover{
    background:rgba(255,255,255,0.28);
    transform:translateY(-3px);
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
}

/* ---------- HERO IMAGE ---------- */

.hero{
    width:90%;
    max-width:1400px;
    height:520px;
    margin:40px auto;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 15px 45px rgba(0,0,0,0.35);
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ---------- CONTENT ---------- */

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

.section{
    background:var(--glass);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.12);
    padding:40px;
    margin-bottom:30px;
    border-radius:24px;
    box-shadow:0 10px 35px rgba(0,0,0,0.15);
}

h2{
    color:var(--primary);
    margin-bottom:20px;
    font-size:2rem;
}

/* ---------- CARDS ---------- */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.card{
    background:var(--glass);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.12);
    padding:30px;
    border-radius:20px;
    transition:all 0.3s ease;
}

.card:hover{
    transform:translateY(-8px);
    background:var(--glass-strong);
    box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

.card h3{
    color:var(--primary);
    margin-bottom:12px;
}

/* ---------- IMAGE GALLERY ---------- */

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
    margin-top:30px;
}

.gallery figure{
    background:var(--glass);
    border-radius:20px;
    overflow:hidden;
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.12);
    transition:all 0.3s ease;
}

.gallery figure:hover{
    transform:translateY(-8px);
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

.gallery img{
    width:100%;
    height:260px;
    object-fit:cover;
    display:block;
}

.gallery figcaption{
    padding:18px;
    text-align:center;
    color:#dbeafe;
    font-size:0.95rem;
}

/* ---------- FOOTER ---------- */

footer{
    text-align:center;
    padding:50px;
    color:#cbd5e1;
    font-size:0.95rem;
}

/* ---------- MOBILE ---------- */

@media(max-width:768px){

    header h1{
        font-size:2.2rem;
    }

    header p{
        font-size:1rem;
    }

    .hero{
        height:320px;
    }

    .section{
        padding:25px;
    }

    h2{
        font-size:1.6rem;
    }

}

</style>
</head>
