<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Blue Green Yard</title>
<link rel="icon" href="favicon.png" type="image/png">
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg,#0a2540,#0e7490,#10b981);
        color:white;
        line-height:1.7;
        min-height:100vh;
    }

    header{
        text-align:center;
        padding:80px 20px 40px;
        position:relative;
    }

    header h1{
        font-size:3rem;
        margin-bottom:15px;
    }

    header p{
        max-width:900px;
        margin:auto;
        font-size:1.2rem;
    }

    nav{
        margin-top:20px;
        display:flex;
        justify-content:center;
        gap:20px;
        flex-wrap:wrap;
        padding:10px 0;
    }

    nav a{
        text-decoration:none;
        color:white;
        font-weight:600;
        padding:8px 14px;
        border-radius:10px;
        transition:0.3s;
        background:rgba(255,255,255,0.15);
        backdrop-filter: blur(6px);
    }

    nav a:hover,
    nav a.active{
        background:white;
        color:#0a2540;
        transform:translateY(-2px);
    }

    .container{
        width:90%;
        max-width:1400px;
        margin:auto;
    }

    .section{
        background:rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        padding:30px;
        margin-bottom:30px;
        border-radius:20px;
    }

    h2{
        color:#7dd3fc;
        margin-bottom:20px;
    }

    .dashboard-frame{
        width:100%;
        height:80vh;
        min-height:700px;
        border:none;
        border-radius:16px;
        background:white;
        display:block;
    }

    .dashboard-link{
        display:inline-block;
        margin-top:20px;
        color:white;
        text-decoration:none;
        font-weight:600;
        padding:10px 18px;
        border-radius:10px;
        background:rgba(255,255,255,0.15);
        transition:0.3s;
    }

    .dashboard-link:hover{
        background:white;
        color:#0a2540;
    }

    footer{
        text-align:center;
        padding:50px;
        color:#cbd5e1;
    }
</style>
</head>

<body>

<header>
    <h1>Dashboard</h1>

    <p>
        Blue Green Yard AI-based Rainwater Harvesting Project
    </p>

    <nav>
        <a href="index.html">Start</a>
        <a href="technical.html">Technical Concept</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="ai.html">AI</a>
        <a href="results.html">Results</a>
       <a href="media.html">Media</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="container">

    <div class="section">
        <h2>Live Dashboard</h2>

        <iframe
            class="dashboard-frame"
            src="https://dashboards.isah.uni-hannover.de/"
            loading="lazy"
            allowfullscreen>
        </iframe>

        <a class="dashboard-link"
           href="https://dashboards.isah.uni-hannover.de/"
           target="_blank"
           rel="noopener">
           Open dashboard in new tab
        </a>
    </div>

</div>

<footer>
    © 2026 | Blue Green Yard AI
</footer>

</body>
</html>
